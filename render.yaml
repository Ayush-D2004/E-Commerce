services:
  - type: web
    name: scalercart-api
    runtime: python
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash scripts/start.sh
    envVars:
      - key: DATABASE_URL
        sync: false           # Paste your NeonDB string in the Render Dashboard
      - key: FRONTEND_URL
        sync: false           # Paste your Vercel URL here after you deploy
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: SEARCH_ARTIFACTS_DIR
        value: artifacts/search
      - key: SEARCH_LEAN_MODE
        value: "true"
