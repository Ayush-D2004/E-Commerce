services:
  - type: web
    name: scalercart-api
    runtime: python
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash scripts/start.sh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: scalercart-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: SEARCH_ARTIFACTS_DIR
        value: artifacts/search

databases:
  - name: scalercart-db
    databaseName: scalercart
    region: oregon
    plan: free
