version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: scaler_user
      POSTGRES_PASSWORD: scaler_password
      POSTGRES_DB: scaler_ecommerce
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
